    <script>

        

        var clarifier = CreateArray(38)

        for (var i = 0; i < mathimata.length; i++) {
            clarifier[i] = 0;
        }

        function SendCourse(obj){
            if (obj.value==-1){
                console.error("Παρακαλώ επιλέξτε μάθημα!");
                return;
            }
            var index=obj.value;
            if (clarifier[index]==1)return;
            if (mathimata[index][1]==-1){
                return;
            }else{
                clarifier[index]=1;
                CourseSetter(mathimata[index][1],mathimata[index][2]-8,mathimata[index][3],mathimata[index][0]);
                if (mathimata[index][4]==-1) return;
                CourseSetter(mathimata[index][4],mathimata[index][5]-8,mathimata[index][6],mathimata[index][0]);
            }
            
        }

        function CourseSetter(day,hour,duration,mathima){
            var table=document.getElementById("mainTable");
            
            for (var i=0;i<duration;i++){
                table.rows[hour+i].cells[day].innerHTML+=mathima+"<br>";
            }
        }

    </script>
